# ─────────────────────────────────────────────────────────────
# SentinelleRx — local infrastructure stack
# Bring up with:  docker compose up -d
# ─────────────────────────────────────────────────────────────
name: sentinellerx

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: srx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelle_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-sentinellerx}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinelle} -d ${POSTGRES_DB:-sentinellerx}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: srx-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: srx-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${POSTGRES_USER:-sentinelle}
      RABBITMQ_DEFAULT_PASS: ${POSTGRES_PASSWORD:-sentinelle_dev_pw}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: srx-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8081"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8081"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: srx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sentinelle}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sentinelle_dev_pw}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: srx-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-sentinelle} ${S3_SECRET_KEY:-sentinelle_dev_pw};
      mc mb -p local/sentinellerx || true;
      mc mb -p local/mlflow || true;
      echo 'buckets ready';
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: srx-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: srx-mlflow
    command: >
      /bin/sh -c "
      pip install --quiet psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-sentinelle}:${POSTGRES_PASSWORD:-sentinelle_dev_pw}@postgres:5432/mlflow
      --artifacts-destination s3://mlflow/
      --serve-artifacts
      "
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-sentinelle}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-sentinelle_dev_pw}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: srx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: srx-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: srx-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: srx-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/monitoring/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
  grafanadata:
