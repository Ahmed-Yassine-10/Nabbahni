apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sentinellerx-staging
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: api }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: web }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
images:
  - name: ghcr.io/sentinellerx/api
    newTag: staging
  - name: ghcr.io/sentinellerx/web
    newTag: staging
  - name: ghcr.io/sentinellerx/ml
    newTag: staging
