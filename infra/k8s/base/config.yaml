apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinellerx-config
data:
  ENVIRONMENT: "production"
  KEYCLOAK_ENABLED: "true"
  KEYCLOAK_URL: "https://auth.sentinellerx.tn"
  KEYCLOAK_REALM: "sentinellerx"
  REDIS_URL: "redis://redis:6379/0"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  PROMETHEUS_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinellerx-web-config
data:
  NEXT_PUBLIC_API_BASE_URL: "https://api.sentinellerx.tn"
  NEXT_PUBLIC_DEFAULT_LOCALE: "fr"
  AUTH_KEYCLOAK_ISSUER: "https://auth.sentinellerx.tn/realms/sentinellerx"
---
# Secrets are managed externally (e.g. ExternalSecrets / Sealed Secrets).
# This is a PLACEHOLDER showing required keys — never commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: sentinellerx-secrets
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql+psycopg://USER:PASS@postgres:5432/sentinellerx"
  RABBITMQ_URL: "amqp://USER:PASS@rabbitmq:5672/"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
